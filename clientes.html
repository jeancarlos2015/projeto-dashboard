```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Clientes</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            padding: 0 20px 30px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .data-section, .charts-section {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        .data-section:hover, .charts-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .data-section h2, .charts-section h2 {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #3498db;
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .customer-info-container p {
            margin: 12px 0;
            font-size: 1.15em;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .customer-info-container p:last-child {
            border-bottom: none;
        }

        .customer-info-container strong {
            color: #7f8c8d;
            min-width: 80px;
            display: inline-block;
        }

        .chart {
            width: 100%;
            height: 450px;
            margin-top: 30px;
            border: 1px solid #eee;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        .nav-button {
            background-color: #3498db;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 20px;
            display: block;
            width: 100%;
            text-align: center;
        }

        .nav-button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .nav-button:active {
            transform: translateY(0px);
        }

        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
                padding: 0 15px 20px 15px;
            }

            header h1 {
                font-size: 2rem;
            }

            .data-section h2, .charts-section h2 {
                font-size: 1.6rem;
            }

            .customer-info-container p {
                font-size: 1.1em;
            }

            .chart {
                height: 380px;
            }
        }

        @media (max-width: 480px) {
            .data-section, .charts-section {
                padding: 20px;
            }

            .nav-button {
                padding: 10px 20px;
                font-size: 1em;
            }
        }
    </style>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <header>
        <h1>Dashboard de Clientes</h1>
    </header>
    <main>
        <section class="data-section">
            <h2>Dados do Cliente</h2>
            <div id="customer-data" class="customer-info-container">
                <p><strong>ID:</strong> <span id="customer-id">-</span></p>
                <p><strong>Nome:</strong> <span id="customer-name">-</span></p>
                <p><strong>Email:</strong> <span id="customer-email">-</span></p>
                <p><strong>Idade:</strong> <span id="customer-age">-</span></p>
                <p><strong>Cidade:</strong> <span id="customer-city">-</span></p>
            </div>
            <button id="next-customer-btn" class="nav-button">Próximo Cliente</button>
        </section>

        <section class="charts-section">
            <h2>Análise de Dados</h2>
            <div id="age-distribution-chart" class="chart"></div>
            <div id="city-distribution-chart" class="chart"></div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const customerIdSpan = document.getElementById('customer-id');
            const customerNameSpan = document.getElementById('customer-name');
            const customerEmailSpan = document.getElementById('customer-email');
            const customerAgeSpan = document.getElementById('customer-age');
            const customerCitySpan = document.getElementById('customer-city');
            const nextCustomerBtn = document.getElementById('next-customer-btn');

            const ageDistributionChartDiv = document.getElementById('age-distribution-chart');
            const cityDistributionChartDiv = document.getElementById('city-distribution-chart');

            // Dados fictícios de clientes
            const customers = [
                { id: 1, nome: 'Alice Smith', email: 'alice.smith@example.com', idade: 28, cidade: 'Nova Iorque' },
                { id: 2, nome: 'Bob Johnson', email: 'bob.johnson@example.com', idade: 35, cidade: 'Los Angeles' },
                { id: 3, nome: 'Charlie Brown', email: 'charlie.b@example.com', idade: 22, cidade: 'Chicago' },
                { id: 4, nome: 'Diana Prince', email: 'diana.p@example.com', idade: 41, cidade: 'Nova Iorque' },
                { id: 5, nome: 'Ethan Hunt', email: 'ethan.h@example.com', idade: 30, cidade: 'São Francisco' },
                { id: 6, nome: 'Fiona Glenanne', email: 'fiona.g@example.com', idade: 29, cidade: 'Los Angeles' },
                { id: 7, nome: 'George Clooney', email: 'george.c@example.com', idade: 55, cidade: 'Chicago' },
                { id: 8, nome: 'Hannah Montana', email: 'hannah.m@example.com', idade: 19, cidade: 'Nova Iorque' },
                { id: 9, nome: 'Ian Malcolm', email: 'ian.m@example.com', idade: 48, cidade: 'São Francisco' },
                { id: 10, nome: 'Jane Doe', email: 'jane.doe@example.com', idade: 33, cidade: 'Los Angeles' }
            ];

            let currentCustomerIndex = 0;

            // Função para exibir dados de um cliente específico
            function displayCustomerData(customer) {
                if (customer) {
                    customerIdSpan.textContent = customer.id;
                    customerNameSpan.textContent = customer.nome;
                    customerEmailSpan.textContent = customer.email;
                    customerAgeSpan.textContent = customer.idade;
                    customerCitySpan.textContent = customer.cidade;
                } else {
                    customerIdSpan.textContent = '-';
                    customerNameSpan.textContent = '-';
                    customerEmailSpan.textContent = '-';
                    customerAgeSpan.textContent = '-';
                    customerCitySpan.textContent = '-';
                }
            }

            // Função para avançar para o próximo cliente
            function showNextCustomer() {
                currentCustomerIndex = (currentCustomerIndex + 1) % customers.length;
                displayCustomerData(customers[currentCustomerIndex]);
            }

            // Função para criar o gráfico de distribuição de idades
            function createAgeDistributionChart(data) {
                const ages = data.map(c => c.idade);

                const trace = {
                    x: ages,
                    type: 'histogram',
                    marker: {
                        color: '#3498db',
                        line: {
                            color: '#2980b9',
                            width: 1
                        }
                    },
                    opacity: 0.75
                };

                const layout = {
                    title: {
                        text: 'Distribuição de Idades dos Clientes',
                        font: {
                            size: 20
                        }
                    },
                    xaxis: {
                        title: 'Idade',
                        titlefont: {
                            size: 14
                        },
                        tickfont: {
                            size: 12
                        }
                    },
                    yaxis: {
                        title: 'Frequência',
                        titlefont: {
                            size: 14
                        },
                        tickfont: {
                            size: 12
                        }
                    },
                    bargap: 0.1,
                    margin: { t: 50, b: 50, l: 50, r: 20 },
                    plot_bgcolor: '#f9f9f9',
                    paper_bgcolor: '#f9f9f9'
                };

                Plotly.newPlot(ageDistributionChartDiv, [trace], layout);
            }

            // Função para criar o gráfico de distribuição de cidades
            function createCityDistributionChart(data) {
                const cityCounts = {};
                data.forEach(customer => {
                    cityCounts[customer.cidade] = (cityCounts[customer.cidade] || 0) + 1;
                });

                const cities = Object.keys(cityCounts);
                const counts = Object.values(cityCounts);

                const trace = {
                    labels: cities,
                    values: counts,
                    type: 'pie',
                    hoverinfo: 'label+value+percent',
                    textinfo: 'label+percent',
                    insidetextorientation: 'radial',
                    marker: {
                        colors: ['#e74c3c', '#f39c12', '#2ecc71', '#9b59b6', '#34495e', '#1abc9c', '#e67e22']
                    },
                    hole: .4 // Para um gráfico de rosca
                };

                const layout = {
                    title: {
                        text: 'Distribuição de Clientes por Cidade',
                        font: {
                            size: 20
                        }
                    },
                    height: 450,
                    margin: { t: 50, b: 50, l: 50, r: 50 },
                    showlegend: true,
                    legend: {
                        orientation: "h",
                        yanchor: "bottom",
                        y: 1.02,
                        xanchor: "right",
                        x: 1
                    },
                    plot_bgcolor: '#f9f9f9',
                    paper_bgcolor: '#f9f9f9'
                };

                Plotly.newPlot(cityDistributionChartDiv, [trace], layout);
            }

            // Inicializar a exibição do primeiro cliente
            displayCustomerData(customers[currentCustomerIndex]);

            // Criar os gráficos
            createAgeDistributionChart(customers);
            createCityDistributionChart(customers);

            // Adicionar evento de clique para o botão de próximo cliente
            nextCustomerBtn.addEventListener('click', showNextCustomer);
        });
    </script>
</body>
</html>
```
