<!DOCTYPE html><html lang=pt-br><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Ranking de Equipes</title><style>body{color:#333;background-color:#f4f7f6;margin:0;padding:20px;font-family:Arial,sans-serif;line-height:1.6}.container{background-color:#fff;border-radius:10px;max-width:900px;margin:20px auto;padding:30px;position:relative;box-shadow:0 4px 15px #0000001a}h1{text-align:center;color:#0056b3;margin-bottom:30px;font-size:2.5em}table{border-collapse:separate;border-spacing:0 10px;width:100%}th,td{text-align:left;padding:15px 20px}thead th{color:#fff;background-color:#007bff;border-radius:5px 5px 0 0;font-weight:700}tbody tr{background-color:#e9ecef;transition:background-color .2s ease-in-out,transform .2s ease-in-out}tbody tr:hover{background-color:#dee2e6;transform:translateY(-3px);box-shadow:0 2px 10px #00000014}tbody td{border-bottom:1px solid #ccc}tbody td:first-child{border-radius:0 0 0 5px}tbody tr:last-child td{border-bottom:none}tbody tr:last-child td:first-child{border-radius:0 0 0 5px}tbody tr:last-child td:last-child{border-radius:0 0 5px}.team-logo{vertical-align:middle;border:2px solid #007bff;border-radius:50%;width:40px;height:40px;margin-right:15px}.team-name{color:#0056b3;vertical-align:middle;font-weight:700}.stats-value{font-weight:500}.positive{color:#28a745}.negative{color:#dc3545}.neutral{color:#6c757d}.filter-container{text-align:center;margin-bottom:25px}.filter-container label{margin-right:10px;font-weight:700}.filter-container select{cursor:pointer;background-color:#fff;border:1px solid #ccc;border-radius:5px;padding:8px 12px;transition:border-color .2s ease-in-out}.filter-container select:focus{border-color:#007bff;outline:none}.back-button{color:#fff;cursor:pointer;background-color:#007bff;border:none;border-radius:5px;padding:10px 15px;font-size:1em;text-decoration:none;transition:background-color .2s ease-in-out;position:absolute;top:20px;right:20px}.back-button:hover{background-color:#0056b3}</style><body>
    <div class=container>
        <h1>Ranking de Equipes Fictícias</h1>

        <a href=/dashboard.html class=back-button>Voltar para Dashboard</a>

        <div class=filter-container>
            <label for=category-filter>Filtrar por Categoria:</label>
            <select id=category-filter>
                <option value=all>Todas</option>
                <option value=esports>Esports</option>
                <option value=automobilismo>Automobilismo</option>
                <option value=futebol>Futebol</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Posição</th>
                    <th>Equipe</th>
                    <th>Pontos</th>
                    <th>Vitórias</th>
                    <th>Derrotas</th>
                    <th>Empates</th>
                    <th>Jogos Disputados</th>
                    <th>Categoria</th>
                </tr>
            </thead>
            <tbody id=team-table-body>
                
            </tbody>
        </table>
    </div>

    <script>const teamsData=[{id:1,name:"Dragons Fury",logo:"https://via.placeholder.com/40/FF5733/FFFFFF?text=DF",points:150,wins:15,losses:2,draws:3,gamesPlayed:20,category:"esports"},{id:2,name:"Phoenix Wings",logo:"https://via.placeholder.com/40/33FF57/FFFFFF?text=PW",points:135,wins:13,losses:3,draws:4,gamesPlayed:20,category:"esports"},{id:3,name:"Cybernetic Lions",logo:"https://via.placeholder.com/40/3357FF/FFFFFF?text=CL",points:120,wins:12,losses:4,draws:4,gamesPlayed:20,category:"esports"},{id:4,name:"Velocity Racing",logo:"https://via.placeholder.com/40/FF33A1/FFFFFF?text=VR",points:160,wins:16,losses:1,draws:3,gamesPlayed:20,category:"automobilismo"},{id:5,name:"Apex Speedsters",logo:"https://via.placeholder.com/40/F1C40F/FFFFFF?text=AS",points:145,wins:14,losses:2,draws:4,gamesPlayed:20,category:"automobilismo"},{id:6,name:"Thunderbolt Motors",logo:"https://via.placeholder.com/40/9B59B6/FFFFFF?text=TM",points:130,wins:13,losses:3,draws:4,gamesPlayed:20,category:"automobilismo"},{id:7,name:"Golden Eagles FC",logo:"https://via.placeholder.com/40/E74C3C/FFFFFF?text=GE",points:170,wins:17,losses:1,draws:2,gamesPlayed:20,category:"futebol"},{id:8,name:"Iron Bulls SC",logo:"https://via.placeholder.com/40/2ECC71/FFFFFF?text=IB",points:155,wins:15,losses:2,draws:3,gamesPlayed:20,category:"futebol"},{id:9,name:"Azure Strikers",logo:"https://via.placeholder.com/40/3498DB/FFFFFF?text=AS",points:140,wins:14,losses:3,draws:3,gamesPlayed:20,category:"futebol"},{id:10,name:"Starlight Warriors",logo:"https://via.placeholder.com/40/5D6D7E/FFFFFF?text=SW",points:110,wins:11,losses:5,draws:4,gamesPlayed:20,category:"esports"},{id:11,name:"Cosmic Racers",logo:"https://via.placeholder.com/40/D35400/FFFFFF?text=CR",points:115,wins:11,losses:4,draws:5,gamesPlayed:20,category:"automobilismo"},{id:12,name:"Emerald Blades",logo:"https://via.placeholder.com/40/1ABC9C/FFFFFF?text=EB",points:125,wins:12,losses:4,draws:4,gamesPlayed:20,category:"futebol"}],tableBody=document.getElementById("team-table-body"),categoryFilter=document.getElementById("category-filter");function renderTable(e){tableBody.innerHTML="",e.forEach((e,t)=>{let s=document.createElement("tr");s.innerHTML=`
                    <td>${t+1}</td>
                    <td>
                        <img src="${e.logo}" alt="${e.name} logo" class="team-logo">
                        <span class="team-name">${e.name}</span>
                    </td>
                    <td class="stats-value">${e.points}</td>
                    <td class="stats-value positive">${e.wins}</td>
                    <td class="stats-value negative">${e.losses}</td>
                    <td class="stats-value neutral">${e.draws}</td>
                    <td class="stats-value">${e.gamesPlayed}</td>
                    <td>${e.category}</td>
                `,tableBody.appendChild(s)})}function filterTeams(){let e=categoryFilter.value,t=teamsData;"all"!==e&&(t=teamsData.filter(t=>t.category===e)),t.sort((e,t)=>t.points-e.points),renderTable(t)}categoryFilter.addEventListener("change",filterTeams),filterTeams();</script>
